name: Print action
run-name: ${{ github.actor }}'s test github action
on: push
jobs:
  first_print:
    name: my first print job
    runs-on: ubuntu-latest
    needs: second_print
    steps:
      - name: first print
        run: echo this is a first print
      - name: impossible action
        run: |
          ./test.sh
  second_print:
    name: my second print job
    runs-on: ubuntu-latest
    steps:
      - name: second print
        run: echo tis is a second print
  send_slack_message:
    name: Send hello world to slack
    if: always()
    needs:
      - first_print
      - second_print
    runs-on: ubuntu-latest
    steps:
      - name: Send hello world
        run: |
          MESSAGE="Hello world"
          curl -X POST ${{ secrets.WEBHOOK_URL }} -H 'Content-type: application/json' --data "{\"text\": \"$MESSAGE\n\
          ${{ needs.first_print.result }}\n\
          ${{ needs.second_print.result }}\n\
          complete logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
